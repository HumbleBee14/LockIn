name: LockIn
options:
  bundleIdPrefix: com.grepguru.lockin
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
settings:
  base:
    SWIFT_VERSION: "6.0"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: YES
targets:
  LockIn:
    type: application
    platform: macOS
    sources: [App, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grepguru.lockin
        INFOPLIST_KEY_LSUIElement: NO
        GENERATE_INFOPLIST_FILE: YES
    dependencies:
      - target: lockind
        embed: true
        copy:
          destination: executables
      - target: lockin-agent
        embed: true
        copy:
          destination: executables
    postBuildScripts:
      - name: Embed Launchd plists
        basedOnDependencyAnalysis: false
        script: |
          set -e
          DAEMONS="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchDaemons"
          AGENTS="$BUILT_PRODUCTS_DIR/$CONTENTS_FOLDER_PATH/Library/LaunchAgents"
          mkdir -p "$DAEMONS" "$AGENTS"
          cp "$SRCROOT/Daemon/lockind.plist" "$DAEMONS/"
          cp "$SRCROOT/Agent/lockin-agent.plist" "$AGENTS/"
  LockInDaemonCore:
    type: library.static
    platform: macOS
    sources: [DaemonCore, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grepguru.lockin.daemoncore
        SWIFT_OBJC_BRIDGING_HEADER: DaemonCore/Engine-Bridging-Header.h
        GCC_PREFIX_HEADER: DaemonCore/Engine/Engine-Prefix.pch
        GCC_PRECOMPILE_PREFIX_HEADER: YES
        DEFINES_MODULE: YES
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/DaemonCore
          - $(SRCROOT)/DaemonCore/Engine/Block Management
          - $(SRCROOT)/DaemonCore/Engine/Common
          - $(SRCROOT)/DaemonCore/Engine/Common/Utility
  lockind:
    type: tool
    platform: macOS
    sources: [Daemon]
    dependencies:
      - target: LockInDaemonCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grepguru.lockin.daemon
  LockInAgentCore:
    type: library.static
    platform: macOS
    sources: [AgentCore, Shared]
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grepguru.lockin.agentcore
        DEFINES_MODULE: YES
  lockin-agent:
    type: tool
    platform: macOS
    sources: [Agent]
    dependencies:
      - target: LockInAgentCore
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.grepguru.lockin.agent
  DaemonTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/DaemonTests]
    dependencies:
      - target: LockInDaemonCore
  AppTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/AppTests]
    dependencies:
      - target: LockIn
  AgentTests:
    type: bundle.unit-test
    platform: macOS
    sources: [Tests/AgentTests]
    dependencies:
      - target: LockInAgentCore
schemes:
  LockIn:
    build:
      targets:
        LockIn: all
        lockind: all
        lockin-agent: all
    test:
      targets:
        - DaemonTests
        - AppTests
        - AgentTests
      gatherCoverageData: false
